<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway Canvas Surfer: Cloud Save Update</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; user-select: none; }
        #game-container { position: relative; width: 100%; height: 100%; max-width: 360px; max-height: 640px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        canvas { background: #4c4c4c; width: 100%; height: 100%; display: block; }
        #ui { position: absolute; top: 10px; left: 0; color: white; font-size: 18px; font-weight: bold; text-align: center; pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); width: 100%; z-index: 10;}
        .status { font-size: 16px; margin-top: 2px; }
        #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: flex-start; align-items: center; z-index: 20; color: white; pointer-events: auto; overflow-y: auto; padding-top: 40px; padding-bottom: 20px;}
        #main-menu h1 { color: #FFD700; text-shadow: 2px 2px #000; margin-bottom: 10px; font-size: 32px; text-align: center; margin-top: 0;}
        #bank-display { font-size: 24px; font-weight: bold; color: #FFD700; margin-bottom: 20px; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid #FFD700;}
        .char-btn { border: 2px solid white; border-radius: 10px; padding: 15px; margin: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 220px; text-align: center; transition: transform 0.1s; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;}
        .char-btn:active { transform: scale(0.95); }
        .locked { filter: grayscale(100%); opacity: 0.8; }
        #btn-upgrade { background: linear-gradient(to bottom, #22aa22, #005500); border-color: #55ff55;}
        #btn-tigey { background: linear-gradient(to bottom, #ff9900, #994400); }
        #btn-ninja { background: linear-gradient(to bottom, #444, #111); border-color: #ff3333;}
        #btn-dash { background: linear-gradient(to bottom, #ff3366, #990033); }
        .interactive { pointer-events: auto; cursor: pointer; }
    </style>
</head>
<body>
<div id="login-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; font-family: sans-serif;">
    <div style="background: white; padding: 30px; border-radius: 15px; text-align: center; width: 300px; box-shadow: 0px 10px 30px rgba(0,0,0,0.5);">
        <h2 style="color: #333; margin-bottom: 20px; margin-top: 0;">Subway Surfer<br><span style="color: #ffcc00; font-size: 18px;">Account Login</span></h2>
        <input type="email" id="user-email" placeholder="Email Address" style="width: 90%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
        <input type="password" id="user-password" placeholder="Password" style="width: 90%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px;">
        <button onclick="handleLogin()" style="width: 100%; padding: 12px; background: #22aa22; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; margin-bottom: 10px;">Play Game</button>
        <button onclick="handleSignUp()" style="width: 100%; padding: 12px; background: #eee; color: #333; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;">Create New Account</button>
        <p id="auth-message" style="color: red; font-size: 14px; margin-top: 15px; font-weight: bold;"></p>
    </div>
</div>
<div id="game-container">
    <div id="ui">
        <div style="display: flex; justify-content: space-between; padding: 0 15px; align-items: flex-start;">
            <div style="text-align: left;">SCORE: <span id="score" style="color:#FFF000;">0</span><br>COINS: <span id="coins" style="color:#FFD700;">0</span></div>
        </div>
        <div id="magnet-status" class="status" style="color: #66ccff;"></div>
        <div id="sneaker-status" class="status" style="color: #ff5555;"></div>
        <div id="board-status" class="status" style="color: #00ffcc;"></div>
    </div>
    <div id="main-menu">
        <h1>RUNNER SHOP</h1>
        <div id="player-welcome" style="color: white; font-size: 14px; margin-bottom: 10px;">Not logged in</div>
        <button onclick="handleLogout()" style="background: #ff4444; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; font-weight: bold;">Logout</button>
        <div id="bank-display">Bank: 0 🪙</div>
        <div class="char-btn interactive" id="btn-upgrade" onclick="buyMultiplier()"><span>⭐ Score x<span id="lbl-mult-val">1</span></span> <span id="lbl-mult-cost">100 🪙</span></div>
        <div style="margin-top: 15px; font-size: 14px; color: #aaa;">CHARACTERS</div>
        <div class="char-btn interactive" id="btn-tigey" onclick="handleCharClick('tigey')"><span>🐅 Tigey</span> <span id="lbl-tigey">Select</span></div>
        <div class="char-btn locked interactive" id="btn-ninja" onclick="handleCharClick('ninja')"><span>🥷 Shadow</span> <span id="lbl-ninja">50 🪙</span></div>
        <div class="char-btn locked interactive" id="btn-dash" onclick="handleCharClick('dash')"><span>🧢 Dash</span> <span id="lbl-dash">100 🪙</span></div>
    </div>
    <canvas id="gameCanvas" width="360" height="640"></canvas>
</div>
<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDOqoo7maC3tTVj5msXR_MvnfwJBjRGrvI",
      authDomain: "subwaybychetan.firebaseapp.com",
      projectId: "subwaybychetan",
      storageBucket: "subwaybychetan.firebasestorage.app",
      messagingSenderId: "170233309409",
      appId: "1:170233309409:web:1180dd6f58260f11746fa0",
      measurementId: "G-1RDSBMNNCD"
    };
    firebase.initializeApp(firebaseConfig); const auth = firebase.auth(); const db = firebase.firestore();
    
    // NO MORE LOCAL STORAGE. ALL GAME DATA STORED HERE
    let coinCount = 0; let scoreMultiplier = 1;
    const characters = {
        tigey: { unlocked: true, cost: 0 },
        ninja: { unlocked: false, cost: 50 },
        dash: { unlocked: false, cost: 100 }
    };

    function loadUserData(uid) {
        db.collection("users").doc(uid).get().then((doc) => {
            if (doc.exists) {
                let data = doc.data(); coinCount = data.coins || 0; scoreMultiplier = data.multiplier || 1;
                if (data.ninjaUnlocked) characters.ninja.unlocked = true;
                if (data.dashUnlocked) characters.dash.unlocked = true;
            }
            if (typeof updateMenuUI === "function") updateMenuUI();
        });
    }

    function saveGame() {
        if(auth.currentUser) {
            db.collection("users").doc(auth.currentUser.uid).set({
                coins: coinCount, multiplier: scoreMultiplier,
                ninjaUnlocked: characters.ninja.unlocked, dashUnlocked: characters.dash.unlocked
            }, { merge: true });
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) { document.getElementById('login-overlay').style.display = 'none'; document.getElementById('player-welcome').innerText = `Logged in as: ${user.email}`; loadUserData(user.uid);
        } else { document.getElementById('login-overlay').style.display = 'flex'; document.getElementById('player-welcome').innerText = "Not logged in"; coinCount = 0; scoreMultiplier = 1; characters.ninja.unlocked = false; characters.dash.unlocked = false; if (typeof updateMenuUI === "function") updateMenuUI(); }
    });
    window.handleSignUp = function() { const email = document.getElementById('user-email').value; const pass = document.getElementById('user-password').value; document.getElementById('auth-message').innerText = "Creating account..."; auth.createUserWithEmailAndPassword(email, pass).catch(error => { document.getElementById('auth-message').innerText = error.message; }); };
    window.handleLogin = function() { const email = document.getElementById('user-email').value; const pass = document.getElementById('user-password').value; document.getElementById('auth-message').innerText = "Logging in..."; auth.signInWithEmailAndPassword(email, pass).catch(error => { document.getElementById('auth-message').innerText = error.message; }); };
    window.handleLogout = function() { if(auth) auth.signOut(); };
    const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
    let score = 0, gameSpeed = 6, baseSpeed = 6, frame = 0, gameState = 'character_select', reviveCost = 1;
    let chaseTimer = 0, introTimer = 0, selectedChar = 'tigey';
    const laneWidth = canvas.width / 3; const laneCenters = [laneWidth / 2, laneWidth * 1.5, laneWidth * 2.5];
    const boards = [
        { main: '#00ffcc', shadow: '#00ccaa', name: 'Neon Cruiser' },
        { main: '#ff4400', shadow: '#cc2200', name: 'Fire Rider' },
        { main: '#cc00ff', shadow: '#8800cc', name: 'Void Glider' }
    ];
    let activeBoard = boards[0];
    const player = {
        lane: 1, x: laneCenters[1], y: canvas.height - 150, width: 30, height: 50,
        jumpTimer: 0, duckTimer: 0, magnetTimer: 0, sneakerTimer: 0, boardTimer: 0, invincibleTimer: 0, onTrain: false
    };
    let obstacles = [], coins = [], powerups = [], touchStartX = 0, touchStartY = 0, lastTapTime = 0;
    
    function updateMenuUI() {
        document.getElementById('bank-display').innerText = `Bank: ${coinCount} 🪙`; document.getElementById('coins').innerText = coinCount; 
        let multCost = scoreMultiplier * 100; document.getElementById('lbl-mult-val').innerText = scoreMultiplier; document.getElementById('lbl-mult-cost').innerText = `${multCost} 🪙`;
        ['tigey', 'ninja', 'dash'].forEach(char => {
            let btn = document.getElementById(`btn-${char}`); let lbl = document.getElementById(`lbl-${char}`);
            if (characters[char].unlocked) { btn.classList.remove('locked'); lbl.innerText = "Select";
            } else { btn.classList.add('locked'); lbl.innerText = `${characters[char].cost} 🪙`; }
        });
    }
    window.buyMultiplier = function() {
        let cost = scoreMultiplier * 100;
        if (coinCount >= cost) { coinCount -= cost; scoreMultiplier++; saveGame(); updateMenuUI();
        } else { alert(`You need ${cost - coinCount} more coins to upgrade your Score Multiplier!`); }
    };
    window.handleCharClick = function(charName) {
        if (characters[charName].unlocked) {
            selectedChar = charName; document.getElementById('main-menu').style.display = 'none';
            score = 0; gameSpeed = baseSpeed; frame = 0; reviveCost = 1; obstacles = []; coins = []; powerups = [];
            player.lane = 1; player.x = laneCenters[1]; player.jumpTimer = 0; player.duckTimer = 0;
            player.magnetTimer = 0; player.sneakerTimer = 0; player.boardTimer = 0; player.invincibleTimer = 0; gameState = 'menu';
        } else {
            if (coinCount >= characters[charName].cost) { coinCount -= characters[charName].cost; characters[charName].unlocked = true; saveGame(); updateMenuUI();
            } else { alert(`You need ${characters[charName].cost - coinCount} more coins!`); }
        }
    };
    canvas.addEventListener('touchstart', e => {
        if (gameState === 'character_select') return;
        let tx = e.changedTouches[0].screenX; let ty = e.changedTouches[0].screenY;
        if (gameState === 'playing') {
            touchStartX = tx; touchStartY = ty; let currentTime = new Date().getTime();
            if (currentTime - lastTapTime < 300) activateBoard(); lastTapTime = currentTime;
        } else { handleCanvasClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY); }
    });
    canvas.addEventListener('touchend', e => { if (gameState === 'playing') handleSwipe(touchStartX, touchStartY, e.changedTouches[0].screenX, e.changedTouches[0].screenY); });
    canvas.addEventListener('mousedown', e => { if (gameState !== 'playing' && gameState !== 'character_select') handleCanvasClick(e.clientX, e.clientY); });
    function handleSwipe(startX, startY, endX, endY) {
        const dx = endX - startX, dy = endY - startY;
        if (Math.max(Math.abs(dx), Math.abs(dy)) > 30) {
            if (Math.abs(dx) > Math.abs(dy)) { if (dx > 0 && player.lane < 2) movePlayer(1); else if (dx < 0 && player.lane > 0) movePlayer(-1);
            } else { if (dy < 0 && player.duckTimer === 0) jump(); else if (dy > 0 && player.jumpTimer === 0) duck(); }
        }
    }
    window.addEventListener('keydown', e => {
        if (gameState === 'menu') { startIntro(); return; } if (gameState !== 'playing') return;
        if (e.key === 'ArrowLeft' && player.lane > 0) movePlayer(-1); if (e.key === 'ArrowRight' && player.lane < 2) movePlayer(1);
        if (e.key === 'ArrowUp' && player.duckTimer === 0) jump(); if (e.key === 'ArrowDown' && player.jumpTimer === 0) duck(); if (e.key === ' ') activateBoard(); 
    });
    function movePlayer(dir) { player.lane += dir; player.x = laneCenters[player.lane]; }
    function jump() { player.jumpTimer = (player.sneakerTimer > 0) ? 65 : 40; } function duck() { player.duckTimer = 40; }
    function activateBoard() { if (player.boardTimer === 0) { player.boardTimer = 600; activeBoard = boards[Math.floor(Math.random() * boards.length)]; document.getElementById('board-status').style.color = activeBoard.main; } }
    function startIntro() { gameState = 'intro'; introTimer = 60; }

    function drawGround(currentSpeed) {
        ctx.fillStyle = '#4c4c4c'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#2a2018'; let offset = (frame * currentSpeed) % 100;
        for (let y = -100; y < canvas.height; y += 100) { ctx.fillStyle = '#111'; ctx.fillRect(0, y + offset + 5, canvas.width, 15); ctx.fillStyle = '#3a2f28'; ctx.fillRect(0, y + offset, canvas.width, 15); }
        for(let i = 0; i < 3; i++) { ctx.fillStyle = '#8094a8'; ctx.fillRect(laneCenters[i] - 20, 0, 5, canvas.height); ctx.fillStyle = '#b0c4de'; ctx.fillRect(laneCenters[i] - 18, 0, 3, canvas.height); ctx.fillStyle = '#8094a8'; ctx.fillRect(laneCenters[i] + 15, 0, 5, canvas.height); ctx.fillStyle = '#b0c4de'; ctx.fillRect(laneCenters[i] + 17, 0, 3, canvas.height); }
        let wallOffset = (frame * currentSpeed) % 40; ctx.fillStyle = '#8b0000'; ctx.fillRect(0, 0, 15, canvas.height); ctx.fillRect(canvas.width - 15, 0, 15, canvas.height);
        ctx.fillStyle = '#550000'; for (let y = -40; y < canvas.height; y += 40) { ctx.fillRect(0, y + wallOffset, 15, 2); ctx.fillRect(canvas.width - 15, y + wallOffset, 15, 2); }
    }
    function drawObstacle(obs) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(obs.x - 35, obs.y + obs.height, obs.width + 10, 15);
        if (obs.type === 'low_barrier') {
            ctx.fillStyle = '#8b4513'; ctx.fillRect(obs.x - 30, obs.y - 15, 10, 30); ctx.fillRect(obs.x + 20, obs.y - 15, 10, 30);
            ctx.fillStyle = '#d2691e'; ctx.fillRect(obs.x - 32, obs.y - 20, 10, 35); ctx.fillRect(obs.x + 22, obs.y - 20, 10, 35);
            ctx.fillStyle = '#ffa500'; ctx.fillRect(obs.x - 40, obs.y - 5, 80, 5); ctx.fillStyle = '#cc5500'; ctx.fillRect(obs.x - 40, obs.y, 80, 15); 
            ctx.fillStyle = '#aa0000'; ctx.fillRect(obs.x - 30, obs.y, 20, 15); ctx.fillRect(obs.x + 10, obs.y, 20, 15); ctx.fillStyle = '#dddddd'; ctx.fillRect(obs.x - 10, obs.y, 20, 15);
        } else if (obs.type === 'high_barrier') {
            ctx.fillStyle = '#333'; ctx.fillRect(obs.x - 38, obs.y - 65, 15, 85); ctx.fillRect(obs.x + 23, obs.y - 65, 15, 85);
            ctx.fillStyle = '#666'; ctx.fillRect(obs.x - 35, obs.y - 60, 10, 80); ctx.fillRect(obs.x + 25, obs.y - 60, 10, 80); 
            ctx.fillStyle = '#005500'; ctx.fillRect(obs.x - 45, obs.y - 65, 90, 45); ctx.fillStyle = '#228b22'; ctx.fillRect(obs.x - 40, obs.y - 60, 80, 40); 
            ctx.fillStyle = 'white'; ctx.font = 'bold 14px sans-serif'; ctx.fillText("DODGE", obs.x, obs.y - 35);
        } else if (obs.type === 'train') {
            ctx.fillStyle = '#222'; ctx.fillRect(obs.x - 32, obs.y, obs.width + 4, obs.height); ctx.fillStyle = obs.color; ctx.fillRect(obs.x - 30, obs.y, obs.width, obs.height);
            ctx.fillStyle = '#444'; ctx.fillRect(obs.x - 32, obs.y, obs.width + 4, 15); ctx.fillStyle = '#add8e6'; for(let wy = obs.y + 30; wy < obs.y + obs.height - 40; wy += 50) ctx.fillRect(obs.x - 20, wy, 40, 30);
        }
    }
    function drawPowerup(p) {
        if (p.type === 'magnet') {
            ctx.fillStyle = '#cc0000'; ctx.beginPath(); ctx.arc(p.x, p.y, 15, Math.PI, 0); ctx.fill(); ctx.fillRect(p.x - 15, p.y, 10, 15); ctx.fillRect(p.x + 5, p.y, 10, 15);
            ctx.fillStyle = 'silver'; ctx.fillRect(p.x - 15, p.y + 10, 10, 5); ctx.fillRect(p.x + 5, p.y + 10, 10, 5); ctx.fillStyle = '#4a90e2'; ctx.beginPath(); ctx.arc(p.x, p.y, 5, Math.PI, 0); ctx.fill();
        } else if (p.type === 'sneakers') {
            ctx.shadowBlur = 10; ctx.shadowColor = '#ff5555'; ctx.fillStyle = '#ff3333'; ctx.fillRect(p.x - 15, p.y - 5, 12, 15); ctx.fillRect(p.x + 3, p.y - 5, 12, 15); 
            ctx.fillStyle = 'white'; ctx.fillRect(p.x - 15, p.y + 10, 12, 5); ctx.fillRect(p.x + 3, p.y + 10, 12, 5); ctx.shadowBlur = 0; 
        }
    }
    function drawPoliceman(px, py) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(px, py + 20, 25, 10, 0, 0, Math.PI*2); ctx.fill();
        ctx.save(); ctx.translate(px, py); ctx.scale(1.2, 1.2); ctx.fillStyle = '#003366'; ctx.fillRect(-15, -15, 30, 35); ctx.fillStyle = '#FFD700'; ctx.beginPath(); ctx.arc(-5, -5, 4, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#ff9999'; ctx.beginPath(); ctx.arc(0, -25, 14, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#003366'; ctx.fillRect(-16, -35, 32, 12); ctx.fillStyle = '#111'; ctx.fillRect(-18, -25, 36, 4); ctx.restore();
    }
    function drawRunner(px, py, isJumping, isDucking, onTrain, isIdle) {
        let drawY = py; if (onTrain) drawY -= 20; if (isJumping) drawY -= (player.sneakerTimer > 0) ? 90 : 40; if (isDucking) drawY += 20; 
        let legOffset = isIdle ? 0 : Math.sin(frame * 0.4) * 15; if (isJumping || isDucking) legOffset = 0;
        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(px, py + 20, 20, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.save(); ctx.translate(px, drawY); if (isDucking) ctx.scale(1, 0.5);
        if (player.boardTimer > 0) { ctx.fillStyle = activeBoard.shadow; ctx.beginPath(); ctx.ellipse(0, 38, 25, 8, 0, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = activeBoard.main; ctx.beginPath(); ctx.ellipse(0, 35, 25, 8, 0, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 10; ctx.shadowColor = activeBoard.main; }
        if (player.magnetTimer > 0) { ctx.strokeStyle = `rgba(100, 200, 255, ${Math.abs(Math.sin(frame * 0.1))})`; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, -10, 40, 0, Math.PI*2); ctx.stroke(); ctx.shadowBlur = 0; }
        if (selectedChar === 'tigey') {
            ctx.strokeStyle = '#ff9900'; ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(0, 5); ctx.quadraticCurveTo(15 + legOffset, 15, 20 + legOffset, 25); ctx.stroke();
            ctx.strokeStyle = '#111'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(10 + legOffset/2, 12); ctx.lineTo(15 + legOffset/2, 10); ctx.stroke();
            ctx.strokeStyle = '#ff9900'; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(-6, 10); ctx.lineTo(-10, 30 + legOffset); ctx.stroke(); ctx.beginPath(); ctx.moveTo(6, 10); ctx.lineTo(10, 30 - legOffset); ctx.stroke();
            ctx.fillStyle = '#ff9900'; ctx.fillRect(-12, -15, 24, 30); ctx.fillStyle = '#111'; ctx.fillRect(-12, -5, 10, 3); ctx.fillRect(2, -5, 10, 3); ctx.fillRect(-12, 5, 8, 3); ctx.fillRect(4, 5, 8, 3);
            ctx.fillStyle = '#ff9900'; ctx.beginPath(); ctx.arc(0, -25, 14, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.moveTo(-10, -35); ctx.lineTo(-4, -25); ctx.lineTo(-14, -25); ctx.fill(); ctx.beginPath(); ctx.moveTo(10, -35); ctx.lineTo(4, -25); ctx.lineTo(14, -25); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(0, -22, 6, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, -24, 3, 0, Math.PI*2); ctx.fill();
        } else if (selectedChar === 'ninja') {
            ctx.strokeStyle = '#222'; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(-6, 10); ctx.lineTo(-10, 30 + legOffset); ctx.stroke(); ctx.beginPath(); ctx.moveTo(6, 10); ctx.lineTo(10, 30 - legOffset); ctx.stroke(); ctx.fillStyle = '#222'; ctx.fillRect(-12, -15, 24, 30); ctx.fillStyle = 'silver'; ctx.fillRect(-10, -15, 20, 5); ctx.fillStyle = '#555'; ctx.fillRect(10, -20, 5, 35); ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(0, -25, 12, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#ffcc99'; ctx.fillRect(-8, -28, 16, 6); ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(10, -25); ctx.quadraticCurveTo(20 + legOffset, -20, 25 + legOffset, -10 + Math.sin(frame*0.2)*5); ctx.stroke();
        } else if (selectedChar === 'dash') {
            ctx.strokeStyle = '#0055aa'; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(-6, 10); ctx.lineTo(-10, 30 + legOffset); ctx.stroke(); ctx.beginPath(); ctx.moveTo(6, 10); ctx.lineTo(10, 30 - legOffset); ctx.stroke(); ctx.fillStyle = '#ff3366'; ctx.fillRect(-12, -15, 24, 30); ctx.fillStyle = '#fff'; ctx.fillRect(-4, -15, 8, 30); ctx.fillStyle = '#ffcc99'; ctx.beginPath(); ctx.arc(0, -25, 12, 0, Math.PI*2); ctx.fill(); ctx.fillStyle = '#3366ff'; ctx.beginPath(); ctx.arc(0, -28, 12, Math.PI, 0); ctx.fill(); ctx.fillRect(8, -28, 8, 5); 
        }
        if (player.sneakerTimer > 0) { ctx.fillStyle = '#ff3333'; ctx.fillRect(-13, 25 + legOffset, 10, 8); ctx.fillRect(3, 25 - legOffset, 10, 8); ctx.fillStyle = 'white'; ctx.fillRect(-13, 31 + legOffset, 10, 3); ctx.fillRect(3, 31 - legOffset, 10, 3); }
        ctx.restore();
    }
    function handleCanvasClick(cx, cy) {
        const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width; const scaleY = canvas.height / rect.height;
        const x = (cx - rect.left) * scaleX; const y = (cy - rect.top) * scaleY;
        if (gameState === 'menu') { startIntro(); } else if (gameState === 'revive') {
            if (x > canvas.width/2 - 80 && x < canvas.width/2 + 80 && y > canvas.height/2 - 20 && y < canvas.height/2 + 30) { if (coinCount >= reviveCost) { coinCount -= reviveCost; reviveCost *= 2; saveGame(); obstacles = obstacles.filter(obs => obs.y < player.y - 200 || obs.y > player.y + 200); player.invincibleTimer = 120; chaseTimer = 200; gameState = 'playing'; } }
            if (x > canvas.width/2 - 60 && x < canvas.width/2 + 60 && y > canvas.height/2 + 60 && y < canvas.height/2 + 100) { saveGame(); gameState = 'gameover'; }
        } else if (gameState === 'gameover') { document.getElementById('main-menu').style.display = 'flex'; updateMenuUI(); gameState = 'character_select'; }
    }
    function update() {
        requestAnimationFrame(update); ctx.clearRect(0, 0, canvas.width, canvas.height); 
        if (gameState === 'character_select') return; 
        drawGround((gameState === 'playing' || gameState === 'gameover') ? gameSpeed : 0);
        if (gameState === 'menu') { frame++; drawRunner(player.x, player.y, false, false, false, true); ctx.fillStyle = 'rgba(0, 0, 0, 0.4)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = 'white'; ctx.textAlign = 'center'; let textSize = 30 + Math.sin(frame * 0.1) * 2; ctx.font = `bold ${textSize}px sans-serif`; ctx.fillText('TAP TO PLAY', canvas.width/2, canvas.height/2 - 50); ctx.font = '16px sans-serif'; ctx.fillText('Swipe to Dodge • Double Tap for Board', canvas.width/2, canvas.height/2 - 20); return; }
        if (gameState === 'intro') { drawPoliceman(player.x, player.y + 60); drawRunner(player.x, player.y, false, false, false, true); ctx.fillStyle = '#ff3333'; ctx.font = 'bold 40px sans-serif'; ctx.fillText('!', player.x, player.y - 70); introTimer--; if (introTimer <= 0) { gameState = 'playing'; gameSpeed = baseSpeed; chaseTimer = 200; } return; }
        if (gameState === 'playing') {
            frame++; score += scoreMultiplier; if (frame % 60 === 0) gameSpeed += 0.05; 
            document.getElementById('score').innerText = `${Math.floor(score / 10)} (x${scoreMultiplier})`; document.getElementById('coins').innerText = coinCount;
            if (player.magnetTimer > 0) { player.magnetTimer--; document.getElementById('magnet-status').innerText = `Magnet: ${Math.floor(player.magnetTimer/60)}s`; } else document.getElementById('magnet-status').innerText = "";
            if (player.sneakerTimer > 0) { player.sneakerTimer--; document.getElementById('sneaker-status').innerText = `Sneakers: ${Math.floor(player.sneakerTimer/60)}s`; } else document.getElementById('sneaker-status').innerText = "";
            if (player.boardTimer > 0) { player.boardTimer--; document.getElementById('board-status').innerText = `${activeBoard.name}: ${Math.floor(player.boardTimer/60)}s`; } else document.getElementById('board-status').innerText = "";
            if (player.invincibleTimer > 0) player.invincibleTimer--; let spawnRate = Math.max(40, 80 - Math.floor(gameSpeed * 2));
            if (frame % spawnRate === 0) {
                let r = Math.random(); let rl = Math.floor(Math.random() * 3);
                if (r < 0.05) powerups.push({ lane: rl, x: laneCenters[rl], y: -40, type: 'magnet' }); else if (r < 0.10) powerups.push({ lane: rl, x: laneCenters[rl], y: -40, type: 'sneakers' }); else if (r < 0.3) obstacles.push({ lane: rl, x: laneCenters[rl], y: -250, width: 60, height: 250, type: 'train', color: '#44aaff' }); else if (r < 0.5) obstacles.push({ lane: rl, x: laneCenters[rl], y: -20, width: 60, height: 20, type: 'low_barrier' }); else if (r < 0.7) obstacles.push({ lane: rl, x: laneCenters[rl], y: -20, width: 60, height: 20, type: 'high_barrier' }); else for(let i=0; i<4; i++) coins.push({ lane: rl, x: laneCenters[rl], y: -40 - (i*40) });
            }
            for (let i = powerups.length - 1; i >= 0; i--) { let p = powerups[i]; p.y += gameSpeed; drawPowerup(p); if (p.lane === player.lane && Math.abs(p.y - player.y) < 40) { if (p.type === 'magnet') player.magnetTimer = 500; if (p.type === 'sneakers') player.sneakerTimer = 500; powerups.splice(i, 1); } else if (p.y > canvas.height + 50) powerups.splice(i, 1); }
            for (let i = obstacles.length - 1; i >= 0; i--) { let obs = obstacles[i]; obs.y += gameSpeed; drawObstacle(obs); let inLane = obs.lane === player.lane; let overlapsY = (player.y > obs.y && player.y < obs.y + obs.height); let isSuperJumping = (player.jumpTimer > 0 && player.sneakerTimer > 0); if (inLane && overlapsY && player.invincibleTimer === 0) { if (obs.type === 'train' && player.y > obs.y + obs.height - 30) { if (!isSuperJumping) triggerCrash(i); } else if (obs.type === 'low_barrier' && player.jumpTimer === 0) triggerCrash(i); else if (obs.type === 'high_barrier' && player.duckTimer === 0) triggerCrash(i); } if (obs.y > canvas.height + 200) obstacles.splice(i, 1); }
            for (let i = coins.length - 1; i >= 0; i--) { let c = coins[i]; c.y += gameSpeed; if (player.magnetTimer > 0 && c.y > 0 && c.y < player.y + 100) { if (c.x < player.x) c.x += 12; if (c.x > player.x) c.x -= 12; } ctx.fillStyle = '#daa520'; ctx.beginPath(); ctx.arc(c.x, c.y + 2, 15, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.ellipse(c.x, c.y, Math.abs(Math.sin(frame * 0.1)) * 15, 15, 0, 0, Math.PI * 2); ctx.fill(); if (Math.abs(c.x - player.x) < 30 && Math.abs(c.y - player.y) < 40) { coinCount++; saveGame(); coins.splice(i, 1); } }
            if (chaseTimer > 0) { chaseTimer--; let fallBehindDistance = 60 + ((200 - chaseTimer) * 1.5); drawPoliceman(player.x, player.y + fallBehindDistance); }
            if (player.jumpTimer > 0) player.jumpTimer--; if (player.duckTimer > 0) player.duckTimer--; if (player.invincibleTimer % 10 < 5) drawRunner(player.x, player.y, player.jumpTimer > 0, player.duckTimer > 0, player.onTrain, false);
        }
        if (gameState === 'revive') {
            drawRunner(player.x, player.y, false, false, false, true); ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.font = 'bold 36px sans-serif'; ctx.fillText('BUSTED!', canvas.width/2, canvas.height/2 - 80);
            if (coinCount >= reviveCost) { ctx.fillStyle = '#00cc66'; ctx.fillRect(canvas.width/2 - 80, canvas.height/2 - 20, 160, 50); ctx.fillStyle = 'white'; ctx.font = 'bold 20px sans-serif'; ctx.fillText(`REVIVE: ${reviveCost} 🪙`, canvas.width/2, canvas.height/2 + 12); } else { ctx.fillStyle = '#ff4444'; ctx.font = 'bold 20px sans-serif'; ctx.fillText(`Need ${reviveCost} 🪙`, canvas.width/2, canvas.height/2 + 12); }
            ctx.fillStyle = '#555'; ctx.fillRect(canvas.width/2 - 60, canvas.height/2 + 60, 120, 40); ctx.fillStyle = 'white'; ctx.font = '16px sans-serif'; ctx.fillText('END GAME', canvas.width/2, canvas.height/2 + 85);
        }
        if (gameState === 'gameover') { ctx.fillStyle = 'rgba(0, 0, 0, 0.9)'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = 'white'; ctx.font = 'bold 36px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20); ctx.font = '20px sans-serif'; ctx.fillText('Tap anywhere to Return', canvas.width / 2, canvas.height / 2 + 30); }
    }
    function triggerCrash(index) { if (player.boardTimer > 0) { player.boardTimer = 0; player.invincibleTimer = 60; obstacles.splice(index, 1); } else { gameState = 'revive'; } }
    updateMenuUI(); update();
</script>
